apiVersion: apps/v1
kind: Deployment
metadata:
  name: discourse-web
  namespace: discourse
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: discourse
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "4000m"
          # S3 credentials for global-S3 uploads (bucket/region/endpoint come from the
          # discourse-env ConfigMap via envFrom). Merged into base's env list by name.
          env:
            - name: DISCOURSE_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: discourse-secrets
                  key: s3-access-key-id
            - name: DISCOURSE_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: discourse-secrets
                  key: s3-secret-access-key
