# EXAMPLE only — NOT wired into kustomization.yaml, so `kubectl apply -k` will not create
# or overwrite discourse-secrets with these placeholders. It documents the name/key shape
# the web Deployment and migration Job reference. Provide the real Secret out-of-band
# (SOPS-encrypted / external secret store) with these exact keys before deploying.
apiVersion: v1
kind: Secret
metadata:
  name: discourse-secrets
  namespace: discourse
type: Opaque
stringData:
  db-password: "REPLACE_ME"
  smtp-password: "REPLACE_ME"
  s3-access-key-id: "REPLACE_ME"
  s3-secret-access-key: "REPLACE_ME"
